<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mortality Heatmap — Whitty &amp; Jewell Networks</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#07090f;--surface:#0f1520;--surface2:#161e2e;--text:#e8d5b0;--text2:#a89878;--text3:#5a5040;--border:#1a2438}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#header{padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
#header h1{font-family:'Playfair Display',serif;font-size:18px;color:var(--text)}
#header .sub{font-size:11px;color:var(--text2);margin-top:2px}
#main{display:flex;flex:1;overflow:hidden;min-height:0}
#chart-wrap{flex:1;position:relative;overflow:hidden}
canvas#chart{position:absolute;inset:0}
#controls{width:240px;background:var(--surface);border-left:1px solid var(--border);padding:14px;overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column;gap:12px}
.ctrl-section h3{font-size:10px;font-weight:500;color:var(--text2);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px}
.ctrl-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.ctrl-label{font-size:12px;color:var(--text2)}
.ctrl-value{font-size:12px;font-weight:500;color:var(--text);min-width:36px;text-align:right}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;background:var(--surface2);border-radius:2px;outline:none;margin-top:4px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--text);cursor:pointer;border:2px solid var(--bg)}
.color-btn{padding:5px 8px;background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--text2);font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;margin-bottom:4px;width:100%;text-align:left}
.color-btn.on{background:var(--surface2);color:var(--text)}
.toggle-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;cursor:pointer;user-select:none}
.toggle-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.toggle-row.off .ctrl-label{color:var(--text3)}
.toggle-row.off .toggle-dot{opacity:0.2}
#cell-info{padding:10px 0;border-top:1px solid var(--border);display:none;flex-direction:column;gap:3px}
#cell-info .ci-title{font-family:'Playfair Display',serif;font-size:13px;color:var(--text);margin-bottom:4px}
.ci-row{display:flex;gap:8px;font-size:11px}
.ci-key{color:var(--text3);min-width:70px;font-size:10px;text-transform:uppercase;flex-shrink:0}
.ci-val{color:var(--text2);line-height:1.4}
#ep-info{padding:8px 0;border-top:1px solid var(--border);display:none}
#ep-info .en{font-family:'Playfair Display',serif;font-size:13px;margin-bottom:4px}
.ei-row{display:flex;gap:8px;font-size:11px;margin-bottom:3px}
.ei-key{color:var(--text3);min-width:70px;font-size:10px;text-transform:uppercase;flex-shrink:0}
.ei-val{color:var(--text2)}
</style>
</head>
<body>
<div id="header">
  <div>
    <h1>Mortality Heatmap — Whitty &amp; Jewell</h1>
    <div class="sub">X = death year &middot; Y = age at death &middot; colour intensity = number of deaths in that cell</div>
  </div>
</div>
<div id="main">
  <div id="chart-wrap"><canvas id="chart"></canvas></div>
  <div id="controls">
    <div id="cell-info">
      <div class="ci-title" id="ci-title"></div>
      <div class="ci-row"><span class="ci-key">Deaths</span><span class="ci-val" id="ci-n"></span></div>
      <div class="ci-row"><span class="ci-key">Age range</span><span class="ci-val" id="ci-age"></span></div>
      <div class="ci-row"><span class="ci-key">Year range</span><span class="ci-val" id="ci-yr"></span></div>
      <div class="ci-row"><span class="ci-key">Countries</span><span class="ci-val" id="ci-ctry"></span></div>
      <div class="ci-row"><span class="ci-key">Examples</span><span class="ci-val" id="ci-names"></span></div>
    </div>
    <div id="ep-info">
      <div class="en" id="ep-name"></div>
      <div class="ei-row"><span class="ei-key">Period</span><span class="ei-val" id="ep-period"></span></div>
      <div class="ei-row"><span class="ei-key">Est. dead</span><span class="ei-val" id="ep-dead"></span></div>
      <div class="ei-row"><span class="ei-key">Cause</span><span class="ei-val" id="ep-cause"></span></div>
    </div>
    <div class="ctrl-section">
      <h3>Colour scheme</h3>
      <button class="color-btn on" id="c-heat">Heat (dark→red→yellow)</button>
      <button class="color-btn" id="c-blue">Blue (dark→teal→white)</button>
      <button class="color-btn" id="c-purple">Purple (dark→violet→pink)</button>
    </div>
    <div class="ctrl-section">
      <h3>Scale</h3>
      <button class="color-btn on" id="sc-sqrt">Square root</button>
      <button class="color-btn" id="sc-log">Logarithmic</button>
      <button class="color-btn" id="sc-linear">Linear</button>
    </div>
    <div class="ctrl-section">
      <h3>Epidemic overlays</h3>
      <div id="ep-toggles"></div>
    </div>
    <div class="ctrl-section">
      <h3>Cell size</h3>
      <div class="ctrl-row"><span class="ctrl-label">Year bucket</span><span class="ctrl-value" id="ys-val">5yr</span></div>
      <input type="range" id="ys-sl" min="1" max="3" value="1" step="1">
    </div>
  </div>
</div>

var colorScheme='heat', scaleMode='sqrt';
var W=0,H=0;
var PAD={left:45,right:20,top:20,bottom:40};
var hoveredCell=null, hoveredEp=null;

// Epidemic visibility
var epOn={};
EPS.forEach(function(ep){epOn[ep.name]=true;});

var canvas=document.getElementById('chart');
var ctx=canvas.getContext('2d');
var wrap=document.getElementById('chart-wrap');

var YEAR_MIN=GRID.year_min, YEAR_MAX=GRID.year_max, YEAR_STEP=GRID.year_step;
var AGE_MIN=GRID.age_min,   AGE_MAX=GRID.age_max,   AGE_STEP=GRID.age_step;
var MAX_N=GRID.max_n;

// Build lookup for fast hover
var cellMap={};
GRID.cells.forEach(function(c){ cellMap[c.y+'_'+c.a]=c; });

function scaleVal(n){
  if(scaleMode==='sqrt')   return Math.sqrt(n/MAX_N);
  if(scaleMode==='log')    return Math.log(n+1)/Math.log(MAX_N+1);
  return n/MAX_N;
}

function cellColor(t){
  // t in [0,1]
  if(colorScheme==='heat'){
    // black → dark red → red → orange → yellow → white
    var stops=[
      [0,   [7,9,15]],
      [0.15,[80,0,0]],
      [0.4, [180,20,0]],
      [0.65,[230,100,0]],
      [0.85,[255,200,0]],
      [1.0, [255,255,220]],
    ];
    return interp(t,stops);
  } else if(colorScheme==='blue'){
    var stops=[
      [0,  [7,9,15]],
      [0.2,[0,40,80]],
      [0.5,[0,120,160]],
      [0.75,[0,200,200]],
      [1.0,[220,255,255]],
    ];
    return interp(t,stops);
  } else {
    var stops=[
      [0,  [7,9,15]],
      [0.2,[40,0,80]],
      [0.5,[130,0,180]],
      [0.75,[220,0,180]],
      [1.0,[255,180,255]],
    ];
    return interp(t,stops);
  }
}

function interp(t,stops){
  for(var i=0;i<stops.length-1;i++){
    var t0=stops[i][0],t1=stops[i+1][0];
    if(t>=t0&&t<=t1){
      var f=(t-t0)/(t1-t0);
      var c0=stops[i][1],c1=stops[i+1][1];
      var r=Math.round(c0[0]+(c1[0]-c0[0])*f);
      var g=Math.round(c0[1]+(c1[1]-c0[1])*f);
      var b=Math.round(c0[2]+(c1[2]-c0[2])*f);
      return 'rgb('+r+','+g+','+b+')';
    }
  }
  return '#fff';
}

function xScale(yr){ return PAD.left+(yr-YEAR_MIN)/(YEAR_MAX-YEAR_MIN)*(W-PAD.left-PAD.right); }
function yScale(age){ return (H-PAD.bottom)-(age-AGE_MIN)/(AGE_MAX-AGE_MIN)*(H-PAD.top-PAD.bottom); }
function cellW(){ return (W-PAD.left-PAD.right)/(YEAR_MAX-YEAR_MIN)*YEAR_STEP - 0.5; }
function cellH(){ return (H-PAD.top-PAD.bottom)/(AGE_MAX-AGE_MIN)*AGE_STEP - 0.5; }

function draw(){
  W=canvas.width=wrap.clientWidth;
  H=canvas.height=wrap.clientHeight;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#07090f'; ctx.fillRect(0,0,W,H);

  var cw=cellW(), ch=cellH();

  // Cells
  GRID.cells.forEach(function(c){
    var t=scaleVal(c.n);
    var x=xScale(c.y), y=yScale(c.a+AGE_STEP)-ch;
    ctx.fillStyle=cellColor(t);
    ctx.globalAlpha=(hoveredCell&&hoveredCell!==c)?0.6:1;
    ctx.fillRect(x, y, cw, ch);
  });
  ctx.globalAlpha=1;

  // Highlighted cell border
  if(hoveredCell){
    var hc=hoveredCell;
    var x=xScale(hc.y), y=yScale(hc.a+AGE_STEP)-ch;
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=2;
    ctx.strokeRect(x,y,cw,ch);
  }

  // Epidemic vertical bands
  EPS.forEach(function(ep){
    if(!epOn[ep.name]) return;
    var isHov=ep===hoveredEp;
    var x1=xScale(ep.years[0]), x2=xScale(ep.years[1]+YEAR_STEP);
    ctx.fillStyle=ep.color;
    ctx.globalAlpha=isHov?0.18:0.07;
    ctx.fillRect(x1,PAD.top,x2-x1,H-PAD.top-PAD.bottom);
    // Peak band
    var px1=xScale(ep.peak[0]), px2=xScale(ep.peak[1]+YEAR_STEP);
    ctx.globalAlpha=isHov?0.35:0.15;
    ctx.fillRect(px1,PAD.top,px2-px1,H-PAD.top-PAD.bottom);
    // Label at top
    if(isHov||cw*((ep.years[1]-ep.years[0])/YEAR_STEP)>40){
      ctx.globalAlpha=isHov?0.95:0.45;
      ctx.fillStyle=ep.color;
      ctx.font=(isHov?'bold ':'')+9+'px Inter,sans-serif';
      ctx.textAlign='center';
      var mid=(px1+px2)/2;
      var label=ep.name; if(!isHov&&label.length>14) label=label.slice(0,13)+'…';
      ctx.fillText(label, mid, PAD.top+10);
    }
    ctx.globalAlpha=1;
  });

  // X axis
  ctx.fillStyle='rgba(160,148,120,0.7)'; ctx.font='bold 11px Inter,sans-serif'; ctx.textAlign='center';
  for(var yr=1650;yr<=2000;yr+=50){
    var x=xScale(yr);
    ctx.fillStyle='rgba(255,255,255,0.04)';
    ctx.fillRect(x,PAD.top,1,H-PAD.top-PAD.bottom);
    ctx.fillStyle='rgba(160,148,120,0.7)';
    ctx.fillText(yr, x, H-PAD.bottom+16);
  }
  ctx.fillStyle='rgba(140,128,100,0.5)'; ctx.font='11px Inter,sans-serif';
  ctx.fillText('Death year →', PAD.left+(W-PAD.left-PAD.right)/2, H-4);

  // Y axis
  ctx.textAlign='right';
  ctx.font='bold 11px Inter,sans-serif'; ctx.fillStyle='rgba(160,148,120,0.7)';
  for(var age=0;age<=100;age+=10){
    var y=yScale(age);
    ctx.fillStyle='rgba(255,255,255,0.03)';
    ctx.fillRect(PAD.left,y,W-PAD.left-PAD.right,1);
    ctx.fillStyle='rgba(160,148,120,0.7)';
    ctx.fillText(age+'y', PAD.left-5, y+4);
  }
  ctx.save(); ctx.translate(12,PAD.top+(H-PAD.top-PAD.bottom)/2);
  ctx.rotate(-Math.PI/2); ctx.fillStyle='rgba(140,128,100,0.5)'; ctx.font='11px Inter,sans-serif'; ctx.textAlign='center';
  ctx.fillText('↑ Age at death', 0, 0); ctx.restore();

  // Colour scale legend
  drawLegend();
}

function drawLegend(){
  var lx=PAD.left, ly=H-PAD.bottom+26, lw=180, lh=8;
  for(var i=0;i<lw;i++){
    ctx.fillStyle=cellColor(i/lw);
    ctx.fillRect(lx+i,ly,1,lh);
  }
  ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=0.5;
  ctx.strokeRect(lx,ly,lw,lh);
  ctx.fillStyle='rgba(160,148,120,0.6)'; ctx.font='9px Inter,sans-serif'; ctx.textAlign='left';
  ctx.fillText('0', lx, ly+lh+10);
  ctx.textAlign='right';
  ctx.fillText(MAX_N+' deaths', lx+lw, ly+lh+10);
  ctx.textAlign='center';
  ctx.fillText('Deaths per cell', lx+lw/2, ly-2);
}

// Hover
canvas.addEventListener('mousemove',function(e){
  var rect=canvas.getBoundingClientRect();
  var mx=e.clientX-rect.left, my=e.clientY-rect.top;
  var cw=cellW(), ch=cellH();

  // Find hovered cell
  var yr=YEAR_MIN+Math.floor((mx-PAD.left)/(W-PAD.left-PAD.right)*(YEAR_MAX-YEAR_MIN)/YEAR_STEP)*YEAR_STEP;
  var age=AGE_MIN+Math.floor((1-(my-PAD.top)/(H-PAD.top-PAD.bottom))*(AGE_MAX-AGE_MIN)/AGE_STEP)*AGE_STEP;
  var cell=cellMap[yr+'_'+age]||null;

  // Find hovered epidemic
  var ep2=null;
  EPS.forEach(function(ep){
    if(!epOn[ep.name]) return;
    var x1=xScale(ep.years[0]), x2=xScale(ep.years[1]+YEAR_STEP);
    if(mx>=x1&&mx<=x2) ep2=ep;
  });

  if(cell!==hoveredCell||ep2!==hoveredEp){ hoveredCell=cell; hoveredEp=ep2; draw(); }

  // Update sidebar
  var ci=document.getElementById('cell-info');
  var ei=document.getElementById('ep-info');
  if(cell){
    ci.style.display='flex';
    document.getElementById('ci-title').textContent=cell.n+' deaths';
    document.getElementById('ci-n').textContent=cell.n;
    document.getElementById('ci-age').textContent=cell.a+'–'+(cell.a+GRID.age_step)+'y';
    document.getElementById('ci-yr').textContent=cell.y+'–'+(cell.y+GRID.year_step);
    var ctry=Object.entries(cell.countries).sort(function(a,b){return b[1]-a[1];}).slice(0,3);
    document.getElementById('ci-ctry').textContent=ctry.map(function(x){return x[0]+' ('+x[1]+')';}).join(', ');
    document.getElementById('ci-names').textContent=cell.names.join(', ')+(cell.n>3?'…':'');
  } else { ci.style.display='none'; }

  if(ep2){
    ei.style.display='block';
    document.getElementById('ep-name').textContent=ep2.name;
    document.getElementById('ep-name').style.color=ep2.color;
    document.getElementById('ep-period').textContent=ep2.years[0]+'–'+ep2.years[1]+' (peak '+ep2.peak[0]+(ep2.peak[0]!==ep2.peak[1]?'–'+ep2.peak[1]:'')+')';
    document.getElementById('ep-dead').textContent=ep2.global_deaths||'—';
    document.getElementById('ep-cause').textContent=ep2.cause||'—';
  } else { ei.style.display='none'; }
});
canvas.addEventListener('mouseleave',function(){
  hoveredCell=null; hoveredEp=null; draw();
  document.getElementById('cell-info').style.display='none';
  document.getElementById('ep-info').style.display='none';
});

// Colour scheme buttons
['heat','blue','purple'].forEach(function(s){
  document.getElementById('c-'+s).onclick=function(){
    document.querySelectorAll('.color-btn').forEach(function(b){if(b.id.startsWith('c-'))b.classList.remove('on');});
    this.classList.add('on'); colorScheme=s; draw();
  };
});
// Scale buttons
['sqrt','log','linear'].forEach(function(s){
  document.getElementById('sc-'+s).onclick=function(){
    document.querySelectorAll('.color-btn').forEach(function(b){if(b.id.startsWith('sc-'))b.classList.remove('on');});
    this.classList.add('on'); scaleMode=s; draw();
  };
});

// Epidemic toggles
(function(){
  var div=document.getElementById('ep-toggles');
  EPS.forEach(function(ep){
    var row=document.createElement('div'); row.className='toggle-row';
    row.innerHTML='<div class="toggle-dot" style="background:'+ep.color+'"></div><span class="ctrl-label" style="font-size:10px">'+ep.name+'</span>';
    row.onclick=function(){
      epOn[ep.name]=!epOn[ep.name]; row.classList.toggle('off',!epOn[ep.name]); draw();
    };
    div.appendChild(row);
  });
})();

window.addEventListener('resize',draw);
draw();
</script>
</body>
