<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1520;--surface:#1a2035;--surface2:#222b42;--text:#e8d5b0;--text2:#a89878;--text3:#6b5f4a;--border:#2a3450;--border2:#3a4560}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:1000}
#header h1{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;color:var(--text)}
#header .sub{font-size:11px;color:var(--text2);margin-top:2px}
#year-display{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--text);min-width:60px;text-align:right}
#main{display:flex;flex:1;overflow:hidden;min-height:0}
#map{flex:1;z-index:1;min-height:0}
#controls{width:230px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;padding:14px;gap:13px;overflow-y:auto;flex-shrink:0;z-index:1000}
.ctrl-section h3{font-size:10px;font-weight:500;color:var(--text2);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px}
.ctrl-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
.ctrl-label{font-size:12px;color:var(--text2)}
.ctrl-value{font-size:12px;font-weight:500;color:var(--text);min-width:36px;text-align:right}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:var(--surface2);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--text);cursor:pointer;border:2px solid var(--bg)}
.route-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:11px;color:var(--text2)}
.route-count{color:var(--text);font-weight:500}
.ctrl-btn{width:100%;padding:7px;background:transparent;border:1px solid var(--border2);border-radius:6px;color:var(--text2);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;margin-bottom:4px}
.ctrl-btn:hover{background:var(--surface2);color:var(--text)}
/* Timeline */
#timeline-bar{padding:8px 20px 10px;background:rgba(15,21,32,0.97);border-top:1px solid var(--border);flex-shrink:0;z-index:1000;display:flex;align-items:center;gap:14px}
#play-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:var(--text);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#play-btn:hover{background:rgba(255,255,255,0.2)}
#tl-wrap{flex:1;height:24px;position:relative;cursor:pointer}
#tl-track{position:absolute;top:50%;left:0;right:0;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;transform:translateY(-50%)}
#tl-fill{position:absolute;top:0;left:0;height:100%;background:linear-gradient(90deg,#ff2200,#ffcc00,#22aa44);border-radius:2px}
#tl-thumb{position:absolute;top:50%;width:13px;height:13px;border-radius:50%;background:var(--text);border:2px solid var(--bg);transform:translate(-50%,-50%);pointer-events:none}
.tl-tick{position:absolute;bottom:-14px;font-size:9px;color:var(--text3);transform:translateX(-50%)}
#speed-sel{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:var(--text);font-size:11px;padding:3px 6px;border-radius:4px;cursor:pointer}
#arc-count{font-size:11px;color:var(--text2);min-width:90px}
/* Arc canvas overlay */
#arc-canvas{position:absolute;top:0;left:0;pointer-events:none;z-index:500}
/* Popup */
.leaflet-popup-content-wrapper{background:var(--surface);border:1px solid var(--border2);border-radius:9px;box-shadow:0 4px 20px rgba(0,0,0,0.6);color:var(--text)}
.leaflet-popup-tip{background:var(--surface)}
.leaflet-popup-content{margin:11px 13px;font-family:'Inter',sans-serif;font-size:12px;line-height:1.6}
.pop-name{font-family:'Playfair Display',serif;font-size:14px;color:var(--text);margin-bottom:3px}
.pop-row{color:var(--text2);margin-bottom:2px}
.pop-link{color:#00b4f0;text-decoration:none}
</style>
</head>

const MIN_YEAR = 1600, MAX_YEAR = 1982, YEAR_RANGE = MAX_YEAR - MIN_YEAR;
const DEG_COLORS = ['#ff2200','#ff6600','#ff9900','#ffcc00','#ffee00','#ccee00','#88dd00','#44cc22','#22aa44','#009966','#00886e','#006655'];

var currentYear = MIN_YEAR, playing = false, speed = 1;
var timeWindow = 30, arcOpacity = 0.7, showDeg = 11;
var animFrame, lastTs;

// Map
var map = L.map('map', {
  center: [10, 60], zoom: 2,
  scrollWheelZoom: true, touchZoom: true, dragging: true,
  doubleClickZoom: true, zoomControl: true,
});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; CARTO', subdomains: 'abcd', maxZoom: 19
}).addTo(map);

// Canvas overlay for arcs
var canvas = document.getElementById('arc-canvas');
var ctx = canvas.getContext('2d');

function resizeCanvas(){
  var mapEl = document.getElementById('map');
  canvas.width = mapEl.clientWidth;
  canvas.height = mapEl.clientHeight;
}
resizeCanvas();
map.on('resize', resizeCanvas);
setTimeout(function(){ map.invalidateSize(); resizeCanvas(); }, 100);

// Convert lat/lng to canvas pixel
function latLngToCanvas(lat, lng){
  var pt = map.latLngToContainerPoint([lat, lng]);
  return {x: pt.x, y: pt.y};
}

// Draw a cubic bezier arc between two points with apex above the great-circle midpoint
function drawArc(ctx, p1, p2, color, alpha, progress){
  var mx = (p1.x + p2.x) / 2;
  var my = (p1.y + p2.y) / 2;
  var dx = p2.x - p1.x, dy = p2.y - p1.y;
  var dist = Math.sqrt(dx*dx + dy*dy);
  // Control point perpendicular to midpoint, arcing upward
  var cx = mx - dy * 0.35;
  var cy = my + dx * 0.35 - dist * 0.2;

  // Only draw up to `progress` (0–1) along the curve
  ctx.beginPath();
  if(progress >= 1){
    ctx.moveTo(p1.x, p1.y);
    ctx.quadraticCurveTo(cx, cy, p2.x, p2.y);
  } else {
    // De Casteljau subdivision to draw partial curve
    var t = progress;
    var q1x = p1.x + (cx-p1.x)*t, q1y = p1.y + (cy-p1.y)*t;
    var q2x = cx  + (p2.x-cx)*t,  q2y = cy  + (p2.y-cy)*t;
    var bx  = q1x + (q2x-q1x)*t,  by  = q1y + (q2y-q1y)*t;
    ctx.moveTo(p1.x, p1.y);
    ctx.quadraticCurveTo(q1x, q1y, bx, by);
  }
  ctx.strokeStyle = color;
  ctx.globalAlpha = alpha;
  ctx.lineWidth = 1.2;
  ctx.stroke();

  // Dot at head of arc
  if(progress > 0){
    var t2 = Math.min(progress, 1);
    var q1x = p1.x + (cx-p1.x)*t2, q1y = p1.y + (cy-p1.y)*t2;
    var q2x = cx + (p2.x-cx)*t2, q2y = cy + (p2.y-cy)*t2;
    var hx = q1x + (q2x-q1x)*t2, hy = q1y + (q2y-q1y)*t2;
    ctx.beginPath();
    ctx.arc(hx, hy, 2.5, 0, Math.PI*2);
    ctx.fillStyle = color;
    ctx.globalAlpha = alpha;
    ctx.fill();
  }
}

function render(){
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.globalAlpha = 1;

  var visible = MOVERS.filter(function(m){
    if(m.deg > showDeg) return false;
    if(!m.by) return false;
    return Math.abs(m.by - currentYear) <= timeWindow;
  });

  // Animation: arcs born closest to currentYear are most "in flight"
  visible.forEach(function(m){
    var age = currentYear - m.by;  // how many years since birth
    var progress = Math.max(0, Math.min(1, age / Math.max(1, timeWindow)));
    var fade = 1 - Math.abs(m.by - currentYear) / timeWindow;

    try {
      var p1 = latLngToCanvas(m.blat, m.blng);
      var p2 = latLngToCanvas(m.dlat, m.dlng);
      if(isNaN(p1.x)||isNaN(p2.x)) return;
      var color = DEG_COLORS[Math.min(m.deg, DEG_COLORS.length-1)];
      drawArc(ctx, p1, p2, color, fade * arcOpacity, progress);
    } catch(e){}
  });

  // Origin dots
  visible.forEach(function(m){
    try {
      var p = latLngToCanvas(m.blat, m.blng);
      if(isNaN(p.x)) return;
      var fade = 1 - Math.abs(m.by - currentYear) / timeWindow;
      ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
      ctx.fillStyle = DEG_COLORS[Math.min(m.deg,11)];
      ctx.globalAlpha = fade * arcOpacity * 0.8;
      ctx.fill();
    } catch(e){}
  });

  ctx.globalAlpha = 1;
  document.getElementById('arc-count').textContent = 'Showing: ' + visible.length;
}

// Redraw on map move/zoom
map.on('move zoom', render);

// Animation loop
function loop(ts){
  if(!lastTs) lastTs=ts;
  var dt = Math.min((ts-lastTs)/16.67, 3);
  lastTs=ts;
  if(playing){
    currentYear += speed * dt * 0.4;
    if(currentYear > MAX_YEAR){ currentYear=MAX_YEAR; playing=false; updatePlayBtn(); }
  }
  updateUI();
  render();
  animFrame = requestAnimationFrame(loop);
}

function updateUI(){
  document.getElementById('year-display').textContent = Math.floor(currentYear);
  var pct = (currentYear-MIN_YEAR)/YEAR_RANGE*100;
  document.getElementById('tl-fill').style.width = pct+'%';
  document.getElementById('tl-thumb').style.left = pct+'%';
}
function updatePlayBtn(){ document.getElementById('play-btn').innerHTML = playing?'&#9646;&#9646;':'&#9654;'; }

// Controls
document.getElementById('play-btn').onclick=function(){
  playing=!playing;
  if(playing && currentYear>=MAX_YEAR) currentYear=MIN_YEAR;
  updatePlayBtn();
};
document.getElementById('speed-sel').onchange=function(){ speed=+this.value; };
document.getElementById('window-slider').oninput=function(){
  timeWindow=+this.value; document.getElementById('window-val').textContent=this.value; render();
};
document.getElementById('opacity-slider').oninput=function(){
  arcOpacity=this.value/100; document.getElementById('opacity-val').textContent=this.value+'%'; render();
};
document.getElementById('deg-slider').oninput=function(){
  showDeg=+this.value; document.getElementById('deg-val').textContent=this.value; render();
};

// Timeline scrub
var scrubbing=false;
document.getElementById('tl-wrap').addEventListener('mousedown',function(ev){
  scrubbing=true; scrubTo(ev); playing=false; updatePlayBtn();
});
document.addEventListener('mousemove',function(ev){ if(scrubbing) scrubTo(ev); });
document.addEventListener('mouseup',function(){ scrubbing=false; });
function scrubTo(ev){
  var rect=document.getElementById('tl-wrap').getBoundingClientRect();
  var pct=Math.max(0,Math.min(1,(ev.clientX-rect.left)/rect.width));
  currentYear=MIN_YEAR+pct*YEAR_RANGE;
}

// Decade ticks
(function(){
  var tw=document.getElementById('tl-wrap');
  for(var yr=1650;yr<=1950;yr+=50){
    var t=document.createElement('div'); t.className='tl-tick';
    t.textContent=yr; t.style.left=((yr-MIN_YEAR)/YEAR_RANGE*100)+'%';
    tw.appendChild(t);
  }
})();

// Map buttons
document.getElementById('world-btn').onclick=function(){ map.setView([20,60],3); };
document.getElementById('aus-btn').onclick=function(){ map.setView([-27,135],4); };
document.getElementById('uk-btn').onclick=function(){ map.setView([54,-3],6); };

// Route summary
(function(){
  var routes={};
  MOVERS.forEach(function(m){
    var k=m.from_country+' → '+m.to_country;
    routes[k]=(routes[k]||0)+1;
  });
  var sorted=Object.entries(routes).sort(function(a,b){return b[1]-a[1];}).slice(0,8);
  var el=document.getElementById('route-list');
  sorted.forEach(function(r){
    var row=document.createElement('div'); row.className='route-row';
    row.innerHTML='<span>'+r[0]+'</span><span class="route-count">'+r[1]+'</span>';
    el.appendChild(row);
  });
})();

// Click on map to find nearest mover
map.on('click',function(ev){
  var lat=ev.latlng.lat, lng=ev.latlng.lng;
  var best=null, bestDist=Infinity;
  MOVERS.forEach(function(m){
    var d=Math.sqrt(Math.pow(m.blat-lat,2)+Math.pow(m.blng-lng,2));
    if(d<bestDist){bestDist=d;best=m;}
  });
  if(best && bestDist<2){
    L.popup().setLatLng([best.blat,best.blng])
      .setContent('<div class="pop-name">'+best.name+'</div>'+
        '<div class="pop-row">'+(best.by||'?')+(best.dy?'–'+best.dy:'–')+'</div>'+
        '<div class="pop-row">Born: '+best.bloc+'</div>'+
        '<div class="pop-row">Died: '+best.dloc+'</div>'+
        '<div class="pop-row"><a class="pop-link" href="https://www.wikitree.com/wiki/'+best.wid+'" target="_blank">'+best.wid+'</a></div>')
      .openOn(map);
  }
});

requestAnimationFrame(loop);
</script>
</body>
